<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Proto — Captain order screen (~10 products)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Inline theme mirrors frontend/src/index.css @theme (plan-review F3).
  tailwind.config = { theme: { extend: {
    colors: { brand: '#1a4480', 'brand-hover': '#1e3a8a', 'brand-subtle': '#e3eaf3', critical: '#dc2626' },
    fontSize: { caption: '0.6875rem', label: '0.75rem' },
  } } };
</script>
<style>body { font-feature-settings: "tnum"; }</style>
</head>
<body class="bg-slate-50 font-sans">
  <p class="mx-auto max-w-md px-4 py-2 text-xs text-slate-500">
    <b>PROPOSAL — Captain order screen at scale (~10 products).</b> Promoted “visible math” + a
    compact, scannable card so a full order stays readable on a phone.
  </p>

  <div class="mx-auto max-w-md bg-slate-50 pb-24">
    <!-- brand header (AppHeader) -->
    <header class="sticky top-0 z-20 bg-brand px-4 py-3 text-white">
      <div class="mb-2 flex items-center justify-between">
        <h1 class="text-lg font-semibold tracking-tight">Pita Bros — Zamówienia</h1>
        <span aria-hidden="true">≡</span>
      </div>
      <div class="flex gap-2 text-xs">
        <span class="rounded-full bg-white/20 px-2.5 py-1">📍 Wola</span>
        <span class="rounded-full bg-white/20 px-2.5 py-1">👤 WOLA</span>
        <span class="rounded-full bg-white/20 px-2.5 py-1">📅 nd 08.06</span>
      </div>
    </header>

    <!-- supplier chips -->
    <div class="flex gap-2 overflow-x-auto px-4 py-3">
      <button class="whitespace-nowrap rounded-full bg-brand px-4 py-2 text-sm font-medium text-white">Bukat</button>
      <button class="whitespace-nowrap rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700">Pago</button>
    </div>

    <!-- product cards -->
    <div id="list" class="space-y-2 px-4"></div>
  </div>

  <!-- sticky action bar -->
  <div class="fixed inset-x-0 bottom-0 mx-auto max-w-md border-t border-slate-200 bg-white p-3 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
    <div class="flex items-center gap-2">
      <button class="rounded-lg border border-slate-300 bg-white px-4 py-3 text-sm font-semibold text-slate-700">Szkic</button>
      <button class="flex-1 rounded-lg bg-brand px-5 py-3 text-sm font-semibold text-white">Wyślij · 10 pozycji</button>
    </div>
  </div>

  <script>
    // [name, target, current, gap, suggestion-text, suggested-num, order-num, state]
    // state: 'crit' | 'dev' | 'ok'
    const P = [
      ['Pita', 120, 18, 102, '9 kartonów  (1 karton = 12 szt)', 9, 9, 'crit'],
      ['Gyros kurczak', 25, 6, 19, '19 kg', 19, 19, 'ok'],
      ['Gyros wieprzowy', 20, 11, 9, '9 kg', 9, 9, 'ok'],
      ['Sos czosnkowy', 40, 15, 25, '25 szt', 25, 25, 'ok'],
      ['Frytki', 8, 1, 7, '7 kartonów', 7, 7, 'crit'],
      ['Cola 0,5 l', 48, 30, 18, '18 szt  (1 zgrzewka = 6)', 18, 24, 'dev'],
      ['Sos ostry', 30, 22, 8, '8 szt', 8, 8, 'ok'],
      ['Sałata lodowa', 15, 9, 6, '6 kg', 6, 6, 'ok'],
      ['Pomidor', 20, 14, 6, '6 kg', 6, 6, 'ok'],
      ['Ser feta', 10, 7, 3, '3 kg', 3, 3, 'ok'],
    ];
    const border = { crit: 'border-l-critical', dev: 'border-l-orange-500', ok: 'border-l-slate-200' };
    const wash   = { crit: 'bg-red-50/40', dev: 'bg-orange-50/40', ok: 'bg-white' };
    document.getElementById('list').innerHTML = P.map(([name,t,c,g,sg,sug,ord,st]) => `
      <div class="rounded-xl border border-l-4 border-slate-200 ${border[st]} ${wash[st]} p-3 shadow-sm">
        <div class="flex items-start justify-between gap-2">
          <h3 class="font-semibold text-slate-900">${name}</h3>
          ${st==='crit' ? '<span class="rounded-full bg-critical px-2 py-0.5 text-caption font-extrabold uppercase tracking-wider text-white">Krytyczny</span>' : ''}
          ${st==='dev'  ? '<span class="rounded-full bg-orange-100 px-2 py-0.5 text-caption font-bold uppercase tracking-wider text-orange-900">Odchył.</span>' : ''}
        </div>
        <div class="mt-1.5 flex items-end justify-between gap-3">
          <div class="text-sm text-slate-700">
            Cel <b class="text-brand">${t}</b> · masz <b class="text-brand">${c}</b> · brakuje <b class="text-brand">${g}</b>
            <div class="text-caption text-slate-500">→ ${sg}</div>
          </div>
          <div class="flex shrink-0 items-end gap-2">
            <div class="text-center"><div class="text-caption uppercase text-slate-400">sug</div>
              <div class="rounded-lg bg-brand-subtle px-2 py-1.5 text-base font-bold text-brand">${sug}</div></div>
            <label class="text-center"><div class="text-caption uppercase text-slate-400">zamów</div>
              <input class="w-16 rounded-lg border-2 ${st==='dev'?'border-orange-500':'border-brand'} py-1.5 text-center text-base font-bold tabular-nums" value="${ord}" /></label>
          </div>
        </div>
      </div>`).join('');
  </script>
</body>
</html>
