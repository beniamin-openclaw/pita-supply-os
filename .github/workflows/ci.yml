name: CI

# Product CI — runs the ACTUAL product's checks (backend ruff+pytest, frontend
# build+lint), the exact commands from AGENTS.md / the /verify skill. Addresses
# the lessons.md gap "Verify CI actually runs the product's tests" (this repo
# previously had no product CI). No deploy, no secrets: the backend suite forces
# the seed backend and blanks Google creds via tests/conftest.py.

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supply-os-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest

  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build (tsc + vite)
        run: npm run build
      - name: Lint (eslint)
        run: npm run lint
      - name: Test (vitest)
        run: npm run test
