name: CI

# Product CI — runs the ACTUAL product's checks (backend ruff+pytest installed
# from the pinned lock, a real-Postgres integration job, frontend
# build+lint+vitest) plus a lockfile-drift guard, the exact commands from
# AGENTS.md / the /verify skill. Addresses the lessons.md gap "Verify CI actually
# runs the product's tests" (this repo previously had no product CI). No deploy,
# no secrets: the backend suite forces the seed backend and blanks Google creds
# via tests/conftest.py.

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supply-os-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: supply-os-v1/requirements-dev.txt
      - name: Install dependencies (from pinned lock)
        # Reproducible install: pinned dev lock, then the local package with no
        # re-resolution (--no-deps) so only the locked versions are used.
        run: |
          pip install -r requirements-dev.txt
          pip install -e . --no-deps
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest

  backend-integration:
    name: Backend integration (real Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supply-os-v1
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Exercises the Supabase backend path (L1: CI must actually run it). The
      # integration tests apply migrations 0001+0002 into this ephemeral DB
      # themselves, then prove the 5 status-transition 409 row-lock contracts.
      # Plain local container → no sslmode (prod DSN adds sslmode=require at runtime).
      SUPPLY_OS_DATA_BACKEND: supabase
      SUPPLY_OS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: supply-os-v1/requirements-dev.txt
      - name: Install dependencies (from pinned lock)
        run: |
          pip install -r requirements-dev.txt
          pip install -e . --no-deps
      - name: Integration tests (pytest -m integration)
        run: pytest -m integration

  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build (tsc + vite)
        run: npm run build
      - name: Lint (eslint)
        run: npm run lint
      - name: Test (vitest)
        run: npm run test

  lockfile-drift:
    name: Lockfile drift (pip-compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supply-os-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: supply-os-v1/requirements-dev.txt
      - name: Install pinned pip-tools
        # The dev lock pins pip-tools, so recompiling here uses the SAME resolver
        # version that generated the committed locks — keeping the diff honest.
        run: pip install -r requirements-dev.txt
      - name: Recompile locks (must match the committed files)
        # Identical invocation to the AGENTS.md regen procedure (same flags +
        # Python 3.12), so the autogen header + ordering are byte-stable.
        run: |
          pip-compile --strip-extras --output-file=requirements.txt pyproject.toml
          pip-compile --strip-extras --extra dev --output-file=requirements-dev.txt pyproject.toml
      - name: Fail on drift
        # Non-zero diff = pyproject.toml changed without regenerating the locks.
        run: git diff --exit-code requirements.txt requirements-dev.txt
