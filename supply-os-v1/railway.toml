# Railway service config for the Supply OS backend.
#
# The Railway service's Root Directory must be set to this folder (supply-os-v1/)
# so Railway finds the Procfile + pyproject.toml. The Procfile owns the start
# command (uvicorn app.main:app --host 0.0.0.0 --port $PORT) — do NOT duplicate
# it here.

[build]
# Pin the builder so a routine redeploy can't silently flip builders and change
# how env vars / the service-account JSON are parsed. Railpack is now Railway's
# default (Nixpacks -> legacy/maintenance), so we pin Railpack.
# NOTE: Railway reads this file by absolute path from the repo root
# (/supply-os-v1/railway.toml); it does NOT follow the Root Directory setting.
builder = "RAILPACK"

[deploy]
# Gate the deploy on a real boot: a release that can't serve /health is held
# back instead of replacing a working one.
healthcheckPath = "/health"
healthcheckTimeout = 100
